kind = "web"
previewPath = "/"
title = "Mafia Party Game"
version = "1.0.0"
id = "artifacts/mafia-game"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21799
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/mafia-game run dev"

[services.env]
PORT = "21799"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/mafia-game", "run", "build"]
publicDir = "artifacts/mafia-game/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
